<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录页面</title>
  <link rel="stylesheet" href="/login/login.css" />
</head>
<body>
  <main class="shell">
    <section class="visual" aria-label="卡通视觉区域">
      <header class="visual-head">
        <p class="visual-company">北京智星空间科技有限公司</p>
        <h2 class="visual-title">遥感服务下单平台</h2>
        <p class="visual-subtitle">Remote Sensing Service Ordering Platform</p>
      </header>
      <div class="scene">
        <div class="character purple" aria-hidden="true">
          <div class="face">
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="mouth"></span>
          </div>
        </div>
        <div class="character black" aria-hidden="true">
          <div class="face">
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="mouth"></span>
          </div>
        </div>
        <div class="character yellow" aria-hidden="true">
          <div class="face">
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="mouth"></span>
          </div>
        </div>
        <div class="character orange" aria-hidden="true">
          <div class="face">
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="mouth"></span>
          </div>
        </div>
      </div>
      <!-- <section class="metrics" aria-label="平台指标">
        <article class="metric">
          <span class="metric-label">接入卫星源</span>
          <strong class="metric-value">128+</strong>
        </article>
        <article class="metric">
          <span class="metric-label">历史订单</span>
          <strong class="metric-value">4.7万+</strong>
        </article>
        <article class="metric">
          <span class="metric-label">平均交付时效</span>
          <strong class="metric-value">&lt; 12h</strong>
        </article>
      </section> -->
    </section>
    <section class="form-panel" aria-label="登录表单区域">
      <div class="form-wrap">
        <div class="brand">
          <span class="brand-badge"></span>
          <span>ZHIXIN SPACE</span>
        </div>
        <h1>欢迎登录遥感服务下单平台</h1>
        <p class="subtitle">企业级遥感数据订购、处理与交付一体化工作台</p>
        <form id="loginForm" novalidate>
          <div class="field">
            <label for="username">账号</label>
            <input class="input" id="username" name="username" type="text" autocomplete="username" placeholder="请输入账号" />
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input class="input" id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
          </div>
          <div class="helper-row">
            <label class="remember" for="remember">
              <input id="remember" type="checkbox" />
              <span>记住我</span>
            </label>
            <a class="link" href="./forgot-password.html">忘记密码</a>
          </div>
          <button class="submit" type="submit">登录</button>
          <div id="error" class="error" aria-live="polite"></div>
        </form>
        <div class="trust-row">
          <span class="trust-pill">TLS 1.3 加密</span>
          <span class="trust-pill">全链路审计</span>
          <span class="trust-pill">7×24 技术支持</span>
          <span class="trust-pill">SLA 保障</span>
        </div>
        <div class="auth-alt">
          <button class="alt-btn" type="button" id="btn-register">用户注册</button>
          <button class="alt-btn" type="button">企业微信登录</button>
        </div>
        <p class="security-note">已启用异地登录防护与风险识别策略，保障订单与数据安全。</p>
        <div class="extra">还没有账号？<a href="./register.html">立即注册</a></div>
      </div>
    </section>
  </main>
  <script src="/runtime-config.js"></script>
  <script src="../js/api-config.js"></script>
  <script src="../js/auth-store.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="./login.js"></script>
</body>
</html>
