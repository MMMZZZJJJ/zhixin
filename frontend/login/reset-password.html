<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>重置密码</title>
  <link rel="stylesheet" href="/login/login.css" />
</head>
<body>
  <main class="shell">
    <section class="visual" aria-label="重置密码视觉区域">
      <header class="visual-head">
        <p class="visual-company">北京智星空间科技有限公司</p>
        <h2 class="visual-title">遥感服务下单平台</h2>
        <p class="visual-subtitle">Remote Sensing Service Ordering Platform</p>
      </header>
    </section>
    <section class="form-panel" aria-label="重置密码表单区域">
      <div class="form-wrap">
        <div class="brand">
          <span class="brand-badge"></span>
          <span>ZHIXIN SPACE</span>
        </div>
        <h1>重置密码</h1>
        <p class="subtitle">请输入新的登录密码，重置完成后即可重新登录</p>
        <form id="resetForm" novalidate>
          <div class="field">
            <label for="newPassword">新密码</label>
            <input class="input" id="newPassword" name="newPassword" type="password" autocomplete="new-password" placeholder="至少 10 位，含大小写字母和数字" />
          </div>
          <div class="field">
            <label for="newPasswordConfirm">确认新密码</label>
            <input class="input" id="newPasswordConfirm" name="newPasswordConfirm" type="password" autocomplete="new-password" placeholder="请再次输入新密码" />
          </div>
          <button class="submit" type="submit">确认重置</button>
          <div id="resetError" class="error" aria-live="polite"></div>
        </form>
        <div class="extra">返回登录页？<a href="./login.html">去登录</a></div>
      </div>
    </section>
  </main>
  <script src="/runtime-config.js"></script>
  <script src="../js/api-config.js"></script>
  <script src="../js/auth-store.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="./reset-password.js"></script>
</body>
</html>
