<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找回密码</title>
  <link rel="stylesheet" href="/login/login.css" />
</head>
<body>
  <main class="shell">
    <section class="visual" aria-label="找回密码视觉区域">
      <header class="visual-head">
        <p class="visual-company">北京智星空间科技有限公司</p>
        <h2 class="visual-title">遥感服务下单平台</h2>
        <p class="visual-subtitle">Remote Sensing Service Ordering Platform</p>
      </header>
    </section>
    <section class="form-panel" aria-label="找回密码表单区域">
      <div class="form-wrap">
        <div class="brand">
          <span class="brand-badge"></span>
          <span>ZHIXIN SPACE</span>
        </div>
        <h1>找回密码</h1>
        <p class="subtitle">输入注册邮箱后，系统会向该邮箱发送重置密码链接</p>
        <form id="forgotForm" novalidate>
          <div class="field">
            <label for="email">邮箱</label>
            <input class="input" id="email" name="email" type="email" autocomplete="email" placeholder="请输入注册邮箱" />
          </div>
          <button class="submit" type="submit">发送重置邮件</button>
          <div id="forgotError" class="error" aria-live="polite"></div>
        </form>
        <div class="extra">想起密码了？<a href="./login.html">返回登录</a></div>
      </div>
    </section>
  </main>
  <script src="/runtime-config.js"></script>
  <script src="../js/api-config.js"></script>
  <script src="../js/auth-store.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="./forgot-password.js"></script>
</body>
</html>
